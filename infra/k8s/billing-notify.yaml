apiVersion: apps/v1
kind: Deployment
metadata: { name: svc-billing }
spec:
  replicas: 2
  selector: { matchLabels: { app: svc-billing } }
  template:
    metadata: { labels: { app: svc-billing } }
    spec:
      containers:
        - name: billing
          image: demb/svc-billing:acme-3.2
          ports: [{ containerPort: 5001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: svc-notify }
spec:
  replicas: 2
  selector: { matchLabels: { app: svc-notify } }
  template:
    metadata: { labels: { app: svc-notify } }
    spec:
      containers:
        - name: notify
          image: demb/svc-notify:2.0.1
          ports: [{ containerPort: 3002 }]
          env:
            - name: KAFKA_BROKERS
              value: kafka-aws:9092,kafka-azure:9092
            - name: RABBIT_URL
              valueFrom:
                secretKeyRef: { name: dem-secrets, key: rabbit-url }
