apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-inventory
  labels: { app: svc-inventory }
spec:
  replicas: 2
  selector:
    matchLabels: { app: svc-inventory }
  template:
    metadata:
      labels: { app: svc-inventory }
    spec:
      containers:
        - name: inventory
          image: demb/svc-inventory:1.8.4
          ports: [{ containerPort: 3001 }]
          env:
            - name: MONOLITH_URL
              value: http://monolith-core:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-inventory-canary
  labels: { app: svc-inventory, track: canary }
spec:
  replicas: 1
  selector:
    matchLabels: { app: svc-inventory, track: canary }
  template:
    metadata:
      labels: { app: svc-inventory, track: canary }
    spec:
      containers:
        - name: inventory
          image: demb/svc-inventory:1.8.5-canary
          env:
            - name: NODE_ENV
              value: canary
            - name: MONOLITH_URL
              value: http://monolith-core:8080
---
apiVersion: v1
kind: Service
metadata: { name: svc-inventory }
spec:
  selector: { app: svc-inventory }
  ports: [{ port: 3001, targetPort: 3001 }]
